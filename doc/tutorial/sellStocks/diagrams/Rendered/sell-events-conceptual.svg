)</text></g><!--entity L3--><g class="entity" data-qualified-name="L3" data-source-line="14" id="ent0006"><rect fill="#FFF3CD" height="62.5938" rx="2.5" ry="2.5" style="stroke:#1F4E79;stroke-width:0.5;" width="202.9893" x="520.18" y="315.4169"/><rect fill="#FFF3CD" height="10" style="stroke:#1F4E79;stroke-width:0.5;" width="15" x="703.1693" y="320.4169"/><rect fill="#FFF3CD" height="2" style="stroke:#1F4E79;stroke-width:0.5;" width="4" x="701.1693" y="322.4169"/><rect fill="#FFF3CD" height="2" style="stroke:#1F4E79;stroke-width:0.5;" width="4" x="701.1693" y="326.4169"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="136.4727" x="535.18" y="348.412">BrokerSyncListener</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="162.9893" x="535.18" y="364.7089">(future, out-of-process)</text></g><!--entity L4--><g class="entity" data-qualified-name="L4" data-source-line="15" id="ent0007"><rect fill="#FFF3CD" height="62.5938" rx="2.5" ry="2.5" style="stroke:#1F4E79;stroke-width:0.5;" width="143.9883" x="757.68" y="315.4169"/><rect fill="#FFF3CD" height="10" style="stroke:#1F4E79;stroke-width:0.5;" width="15" x="881.6683" y="320.4169"/><rect fill="#FFF3CD" height="2" style="stroke:#1F4E79;stroke-width:0.5;" width="4" x="879.6683" y="322.4169"/><rect fill="#FFF3CD" height="2" style="stroke:#1F4E79;stroke-width:0.5;" width="4" x="879.6683" y="326.4169"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="103.9883" x="772.68" y="348.412">BiFeedListener</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="53.457" x="772.68" y="364.7089">(future)</text></g><g class="entity" data-qualified-name="GMN13" data-source-line="24" id="ent0014"><path d="M577.86,183.8869 L577.86,215.1569 L543.49,219.1569 L577.86,223.1569 L577.86,254.4181 A0,0 0 0 0 577.86,254.4181 L787.4806,254.4181 A0,0 0 0 0 787.4806,254.4181 L787.4806,193.8869 L777.4806,183.8869 L577.86,183.8869 A0,0 0 0 0 577.86,183.8869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M777.4806,183.8869 L777.4806,193.8869 L787.4806,193.8869 L777.4806,183.8869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="167.5781" x="583.86" y="200.9538">The event is the contract.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.4219" x="583.86" y="216.0866">Any number of listeners can</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="168.562" x="583.86" y="231.2194">react. The use case never</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="188.6206" x="583.86" y="246.3522">needs to know who they are.</text></g><g class="entity" data-qualified-name="GMN16" data-source-line="31" id="ent0017"><path d="M44.55,439.0169 L44.55,524.6809 A0,0 0 0 0 44.55,524.6809 L248.7941,524.6809 A0,0 0 0 0 248.7941,524.6809 L248.7941,449.0169 L238.7941,439.0169 L150.67,439.0169 L146.67,378.2569 L142.67,439.0169 L44.55,439.0169 A0,0 0 0 0 44.55,439.0169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M238.7941,439.0169 L238.7941,449.0169 L248.7941,449.0169 L238.7941,439.0169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="176.395" x="50.55" y="456.0838">Mandatory in this exercise.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.9741" x="50.55" y="471.2166">Replaces the synchronous</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.2441" x="50.55" y="486.3494">transactionPort.save(...) call</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="143.9331" x="50.55" y="501.4822">that today lives inside</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="72.249" x="50.55" y="516.615">sellStock().</text></g><g class="entity" data-qualified-name="GMN19" data-source-line="39" id="ent0020"><path d="M510.02,439.0169 L510.02,524.6809 A0,0 0 0 0 510.02,524.6809 L733.3262,524.6809 A0,0 0 0 0 733.3262,524.6809 L733.3262,449.0169 L723.3262,439.0169 L625.67,439.0169 L621.67,378.2569 L617.67,439.0169 L510.02,439.0169 A0,0 0 0 0 510.02,439.0169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M723.3262,439.0169 L723.3262,449.0169 L733.3262,449.0169 L723.3262,439.0169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="130.3682" x="516.02" y="456.0838">Illustrative. In a real</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.896" x="516.02" y="471.2166">production system this would</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.3062" x="516.02" y="486.3494">likely consume an externalized</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.4346" x="516.02" y="501.4822">version of the same event</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="64.0986" x="516.02" y="516.615">via Kafka.</text></g><!--link core to evt--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="17" id="lnk8"><path d="M468.67,107.3069 C468.67,133.9769 468.67,165.9669 468.67,189.8269" fill="none" id="core-to-evt" style="stroke:#1F4E79;stroke-width:1;"/><polygon fill="#1F4E79" points="468.67,195.8269,472.67,186.8269,468.67,190.8269,464.67,186.8269,468.67