rtfolios/abc-123/sales</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="201.5063" x="78.2651" y="123.4966">{"ticker":"AAPL", "quantity":0}</text></g><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg2"><line style="stroke:#000000;stroke-width:1;" x1="355.2168" x2="397.2168" y1="203.0938" y2="203.0938"/><line style="stroke:#000000;stroke-width:1;" x1="397.2168" x2="397.2168" y1="203.0938" y2="216.0938"/><line style="stroke:#000000;stroke-width:1;" x1="356.2168" x2="397.2168" y1="216.0938" y2="216.0938"/><polygon fill="#000000" points="366.2168,212.0938,356.2168,216.0938,366.2168,220.0938,362.2168,216.0938" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="141.9463" x="362.2168" y="152.6294">Create Value Objects:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="157.6631" x="362.2168" y="167.7622">PortfolioId.of("abc-123")</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="111.2046" x="362.2168" y="182.895">Ticker.of("AAPL")</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="167.5146" x="362.2168" y="198.0278">ShareQuantity.positive(0)</text></g><path d="M360,229.0938 L360,344.0938 L603,344.0938 L603,239.0938 L593,229.0938 L360,229.0938" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M593,229.0938 L593,239.0938 L603,239.0938 L593,229.0938" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="130.749" x="366" y="246.1606">Defense in depth:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="167.5146" x="366" y="261.2935">ShareQuantity.positive(0)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="211.7642" x="366" y="276.4263">throws InvalidQuantityException</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="163.7441" x="366" y="291.5591">at the adapter boundary.</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="366" y="306.6919">&#160;</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="209.0347" x="366" y="321.8247">Even if bypassed, Portfolio.sell()</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="222.7012" x="366" y="336.9575">checks quantity.isPositive() again.</text><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg3"><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="355.2168" x2="397.2168" y1="386.2891" y2="386.2891"/><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="397.2168" x2="397.2168" y1="386.2891" y2="399.2891"/><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="356.2168" x2="397.2168" y1="399.2891" y2="399.2891"/><polygon fill="#000000" points="366.2168,395.2891,356.2168,399.2891,366.2168,403.2891,362.2168,399.2891" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="210.063" x="362.2168" y="366.0903">throw InvalidQuantityException(</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="202.4014" x="362.2168" y="381.2231">"Quantity must be positive: 0")</text></g><g class="message" data-entity-1="part2" data-entity-2="part5" id="msg4"><polygon fill="#000000" points="925.394,424.4219,935.394,428.4219,925.394,432.4219,929.394,428.4219" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;" x1="355.2168" x2="931.394" y1="428.4219" y2="428.4219"/><text fill="#000000" font-fa