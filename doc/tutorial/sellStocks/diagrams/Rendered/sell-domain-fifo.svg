/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="271.3242" x="117.5049" y="1882.4966">balance = balance.add(result.proceeds())</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="167.5591" x="117.5049" y="1897.6294">balance += Money(1560)</text></g><g class="message" data-entity-1="part1" data-entity-2="part1" id="msg32"><polygon fill="#000000" points="1764.6597,1940.8281,1774.6597,1944.8281,1764.6597,1948.8281,1768.6597,1944.8281" style="stroke:#000000;stroke-width:1;"/><line style="stroke:#000000;stroke-width:1;stroke-dasharray:2,2;" x1="105.5049" x2="1770.6597" y1="1944.8281" y2="1944.8281"/><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="64.2256" x="112.5049" y="1939.7622">SellResult</text></g><path d="M10,1957.8281 L10,2118.8281 L1418,2118.8281 L1418,1967.8281 L1408,1957.8281 L10,1957.8281" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1408,1957.8281 L1408,1967.8281 L1418,1967.8281 L1408,1957.8281" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="13" font-weight="bold" lengthAdjust="spacing" textLength="187.7446" x="486.3149" y="1974.895">Key Invariants Protected:</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="396.5" x="486.3149" y="1990.0278">1. Cannot sell more than owned (ShareQuantity comparison)</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="194.7334" x="486.3149" y="2005.1606">2. FIFO order strictly enforced</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="266.3159" x="486.3149" y="2020.2935">3. Balance (Money) updated consistently</text><text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="281.7788" x="486.3149" y="2035.4263">4. Lot ShareQuantity remai