86" y="445.0138">Pure Java. No Spring, no Jakarta,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.4316" x="907.86" y="460.1466">no JPA, no Jackson. Only the</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.8887" x="907.86" y="475.2794">business model and exceptions.</text></g><g class="entity" data-qualified-name="GMN27" data-source-line="41" id="ent0028"><path d="M914.29,301.4169 L914.29,328.6869 L879.87,332.6869 L914.29,336.6869 L914.29,363.9481 A4,4 0 0 0 918.29,367.9481 L1141.9052,367.9481 A4,4 0 0 0 1145.9052,363.9481 L1145.9052,307.4169 L1135.9052,297.4169 L918.29,297.4169 A4,4 0 0 0 914.29,301.4169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1135.9052,297.4169 L1135.9052,305.4169 A2,2 0 0 0 1137.9052,307.4169 L1145.9052,307.4169 L1135.9052,297.4169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="173.583" x="920.29" y="314.4838">Use cases + ports (in/out).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.0313" x="920.29" y="329.6166">No Spring annotations</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.6152" x="920.29" y="344.7494">(ADR-007). Only @Transactional</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152.9595" x="920.29" y="359.8822">from jakarta is allowed.</text></g><g class="entity" data-qualified-name="GMN30" data-source-line="48" id="ent0031"><path d="M1751.03,170.8869 L1751.03,233.4181 A4,4 0 0 0 1755.03,237.4181 L1989.1633,237.4181 A4,4 0 0 0 1993.1633,233.4181 L1993.1633,176.8869 L1983.1633,166.8869 L1755.03,166.8869 A4,4 0 0 0 1751.03,170.8869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1983.1633,166.8869 L1983.1633,174.8869 A2,2 0 0 0 1985.1633,176.8869 L1993.1633,176.8869 L1983.1633,166.8869" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.5732" x="1757.03" y="183.9538">The ONLY Spring Boot module.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="207.873" x="1757.03" y="199.0866">Holds @Configuration, the main</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="196.8979" x="1757.03" y="214.2194">class, and the Spring Modulith</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.1333" x="1757.03" y="229.3522">@ApplicationModule declarations.</text></g><!--link app to domain--><g class="link" data-entity-1="ent0003" data-entity-2="ent0002" data-link-type="dependency" data-source-line="20" id="lnk11"><path d="M821.09,356.1469 C821.09,377.8769 821.09,404.6169 821.09,426.2969" fill="none" id="app-to-domain" style="stroke:#1F4E79;stroke-width:1;"/><polygon fill="#1F4E79" points="821.09,432.2969,825.09,423.2969,821.09,427.2969,817.09,423.2969,821.09,432.2969" style="stroke:#1F4E79;stroke-width:1;"/></g><!--link rest to app--><g class="link" data-entity-1="ent0004" data-entity-2="ent0003" data-link-type="dependency" data-source-line="21" id="lnk12"><path d="M175.55,225.7669 C190.18,230.0069 205.57,234.1269 220.09,237.4169 C416.59,281.8869 647.9707,311.7292 756.2007,324.3992" fill="none" id="rest-to-app" style="stroke:#1F4E79;stroke-width:1;"/><polygon fill="#1F4E79" points="762.16,325.0969,753.6861,320.0776,757.1939,324.5155,752.756,328.0233,762.16,325.0969" style="stroke:#1F4E79;stroke-width:1;"/></g><!--link tg to app--><g class="link" data-entity-1="ent0005" data-entity-2="ent0003" data-link-type="dependency" data-source-line="22" id="lnk13"><path d="M436.24,225.7569 C529.67,251.4769 674.1351,291.2348 756.5451,313.914