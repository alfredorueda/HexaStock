gthAdjust="spacing" textLength="154.4639" x="1313.63" y="310.7794">consumed by every BC.</text></g><g class="entity" data-qualified-name="GMN13" data-source-line="28" id="ent0014"><path d="M503.16,139.4869 L503.16,163.1869 L468.73,167.1869 L503.16,171.1869 L503.16,194.8853 A0,0 0 0 0 503.16,194.8853 L691.6493,194.8853 A0,0 0 0 0 691.6493,194.8853 L691.6493,149.4869 L681.6493,139.4869 L503.16,139.4869 A0,0 0 0 0 503.16,139.4869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M681.6493,139.4869 L681.6493,149.4869 L691.6493,149.4869 L681.6493,139.4869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="166.2197" x="509.16" y="156.5538">Publishes domain events,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="167.4893" x="509.16" y="171.6866">knows nothing about who</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="108.0498" x="509.16" y="186.8194">consumes them.</text></g><g class="entity" data-qualified-name="GMN16" data-source-line="34" id="ent0017"><path d="M726.86,131.9169 L726.86,202.4481 A0,0 0 0 0 726.86,202.4481 L977.9625,202.4481 A0,0 0 0 0 977.9625,202.4481 L977.9625,171.1869 L1012.39,167.1869 L977.9625,163.1869 L977.9625,141.9169 L967.9625,131.9169 L726.86,131.9169 A0,0 0 0 0 726.86,131.9169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M967.9625,131.9169 L967.9625,141.9169 L977.9625,141.9169 L967.9625,131.9169" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.9204" x="732.86" y="148.9838">Anti-corruption layer absent</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="200.6113" x="732.86" y="164.1166">by design: today the upstream</text><text fill="#000000" fo