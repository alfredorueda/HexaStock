0203,297.1569 L2325.5203,297.1569 L2315.5203,287.1569" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="139.293" x="2126.47" y="304.2238">+ Cohesion improves</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="145.1201" x="2126.47" y="319.3566">+ Easy refactor target</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="184.0503" x="2126.47" y="334.4894">- No build-time enforcement</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="165.5977" x="2134.7346" y="349.6222">of layer or BC boundaries</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="170.6377" x="2126.47" y="364.755">- Spring leaks into domain</text></g><g class="entity" data-qualified-name="GMN26" data-source-line="59" id="ent0027"><path d="M3026.35,282.5869 L3026.35,377.3838 A3,3 0 0 0 3029.35,380.3838 L3236.6586,380.3838 A3,3 0 0 0 3239.6586,377.3838 L3239.6586,289.5869 L3229.6586,279.5869 L3029.35,279.5869 A3,3 0 0 0 3026.35,282.5869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M3229.6586,279.5869 L3229.6586,288.0869 A1.5,1.5 0 0 0 3231.1586,289.5869 L3239.6586,289.5869 L3229.6586,279.5869" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="159.1104" x="3032.35" y="296.6538">+ Strongest BC isolation</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="162.8682" x="3032.35" y="311.7866">+ Independent build/test</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="179.6069" x="3032.35" y="326.9194">- High Maven module count</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="192.3086" x="3032.35" y="342.0522">- Cross-BC value-object reuse</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="107.415" x="3040.6146" y="357.185">becomes painful</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.146" x="3032.35" y="372.3178">- Risk of premature splitting</text></g><g class="entity" data-qualified-name="GMN29" data-source-line="68" id="ent0030"><path d="M1526.9,259.8869 L1526.9,400.0822 A3,3 0 0 0 1529.9,403.0822 L1764.0973,403.0822 A3,3 0 0 0 1767.0973,400.0822 L1767.0973,266.8869 L1757.0973,256.8869 L1529.9,256.8869 A3,3 0 0 0 1526.9,259.8869" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1757.0973,256.8869 L1757.0973,265.3869 A1.5,1.5 0 0 0 1758.5973,266.8869 L1767.0973,266.8869 L1757.0973,256.8869" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="202.9727" x="1532.9" y="273.9538">+ Hexagonal layering enforced</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="210.9326" x="1541.1646" y="289.0866">by Maven module dependencies</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.5024" x="1532.9" y="304.2194">+ BC boundaries enforced by</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="189.103" x="1541.1646" y="319.3522">Spring Modulith at build time</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="208.9966" x="1532.9" y="334.485">+ Single deployable, simple ops</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="164.6519" x="1532.9" y="349.6178">- Each BC is sliced across</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="154.2544" x="1541.1646" y="364.7506">several Maven modules</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="183.4854" x="1532.9" y="379.8835">- Newcomers need a mental</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="141.813" x="1541.1646" y="395.0163">map (this document!)</text></g><!--link A to GMN20--><g class="link" data-entity-1="ent0002" data-entity-2="ent0021" data-link-type="association" data-source-line="44" id="lnk22"><path d="M336.1347,169.0411 C336.2248,169.1623 336.3155,169.2844 336.4069,169.4074 C336.7725,169.8993 337.1484,170.4051 337.5343,170.9243 C338.3061,171.9628 339.1178,173.0549 339.9667,174.1972 C346.7584,183.3356 355.9369,195.6856 366.1638,209.4469 C386.6175,236.9694 411.265,270.1369 429.4,294.5469" fill="none" id="A-GMN20" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link B to GMN23--><g class="link" data-entity-1="ent0007" data-entity-2="ent0024" data-link-type="association" data-source-line="51" id="lnk25"><path d="M2223,233.3056 C2223,234.1829 2223,235.0617 2223,235.9416 C2223,239.4611 2223,242.9979 2223,246.528 C2223,260.6481 2223,274.6594 2223,287.0169" fill="none" id="B-GMN23" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link C to GMN26--><g class="link" data-entity-1="ent0012" data-entity-2="ent0027" data-link-type="association" data-source-line="59" id="lnk28"><path d="M3133,201.0825 C3133,201.2673 3133,201.4525 3133,201.6381 C3133,225.3919 3133,254.8869 3133,279.5069" fill="none" id="C-GMN26" style="stroke:#181818;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link D to GMN29--><g class="link" data-entity-1="ent0015" data-entity-2="ent0030" data-link-type="association" data-source-line="68" id="lnk31"><path d="M1503.1698,167.4235 C1503.2439,167.5081 1503.3184,167.5931 1503.3933,167.6786 C1503.5431,167.8497 1503.6947,168.0227 1503.848,168.1977