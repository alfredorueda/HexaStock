tity-2="part4" id="msg17"><polygon fill="#1F4E79" points="765.4033,875.7422,755.4033,879.7422,765.4033,883.7422,761.4033,879.7422" style="stroke:#1F4E79;stroke-width:1;"/><line style="stroke:#1F4E79;stroke-width:1;stroke-dasharray:2,2;" x1="759.4033" x2="1016.7715" y1="879.7422" y2="879.7422"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="15.4819" x="771.4033" y="874.6763">ok</text></g><g class="message" data-entity-1="part4" data-entity-2="part3" id="msg18"><polygon fill="#1F4E79" points="598.3032,904.875,588.3032,908.875,598.3032,912.875,594.3032,908.875" style="stroke:#1F4E79;stroke-width:1;"/><line style="stroke:#1F4E79;stroke-width:1;stroke-dasharray:2,2;" x1="592.3032" x2="748.4033" y1="908.875" y2="908.875"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.5869" x="604.3032" y="903.8091">updated Watchlist</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg19"><polygon fill="#1F4E79" points="309.7114,934.0078,299.7114,938.0078,309.7114,942.0078,305.7114,938.0078" style="stroke:#1F4E79;stroke-width:1;"/><line style="stroke:#1F4E79;stroke-width:1;stroke-dasharray:2,2;" x1="303.7114" x2="581.3032" y1="938.0078" y2="938.0078"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="118.5869" x="315.7114" y="932.9419">updated Watchlist</text></g><g class="message" data-entity-1="part2" data-entity-2="part2" id="msg20"><line style="stroke:#1F4E79;stroke-width:1;" x1="298.7114" x2="340.7114" y1="967.1406" y2="967.1406"/><line style="stroke:#1F4E79;stroke-width:1;" x1="340.7114" x2="340.7114" y1="967.1406" y2="980.1406"/><line style="stroke:#1F4E79;stroke-width:1;" x1="299.7114" x2="340.7114" y1="980.1406" y2="980.1406"/><polygon fill="#1F4E79" points="309.7114,976.1406,299.7114,980.1406,309.7114,984.1406,305.7114,980.1406" style="stroke:#1F4E79;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.5918" x="305.7114" y="962.0747">WatchlistResponseDTO.from(watchlist)</text></g><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg21"><polygon fill="#1F4E79" points="74.8188,1020.4063,64.8188,1024.4063,74.8188,1028.4063,70.8188,1024.4063" style="stroke:#1F4E79;stroke-width:1;"/><line style="stroke:#1F4E79;stroke-width:1;stroke-dasharray:2,2;" x1="68.8188" x2="292.7114" y1="1024.4063" y2="1024.4063"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="47.7026" x="80.8188" y="1004.2075">200 OK</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="151.6011" x="80.8188" y="1019.3403">WatchlistResponseDTO</text></g><path d="M212,1037.4063 L212,1137.4063 L1268,1137.4063 L1268,1047.4063 L1258,1037.4063 L212,1037.4063" fill="#FFF8E1" style="stroke:#B3C4D9;stroke-width:0.5;"/><path d="M1258,1037.4063 L1258,1047.4063 L1268,1047.4063 L1258,1037.4063" fill="#FFF8E1" style="stroke:#B3C4D9;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="182.3618" x="444.0693" y="1054.4731">Symmetry with diagram 07:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="583.356" x="444.0693" y="1069.606">- Diagram 07: Scheduler (driving adapter) -&gt; MarketSentinelUseCase (port-in) -&gt; service.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="557.1021" x="444.0693" y="1084.7388">- Diagram 12: Controller (driving adapter) -&gt; WatchlistUseCase    (port-in) -&gt; service.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="476.2646" x="444.0693" y="1099.8716">Replace the controller by another driving adapter (a Telegram bot, a CLI,</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="435.1953" x="444.0693" y="1115.0044">another @Scheduled job, an integration test) and nothing changes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="422.7095" x="444.0693" y="1130.1372">inside the hexagon -- that is the whole point of ports &amp; adapters.</text><path d="M940,1148.2031 L940,1324.2031 L1264,1324.2031 L1264,1158.2031 L1254,1148.2031 L940,1148.2031" fill="#FFF8E1" style="stroke:#B3C4D9;stroke-width:0.5;"/><path d="M1254,1148.2031 L1254,1158.2031 L1264,1158.2031 L1254,1148.2031" fill="#FFF8E1" style="stroke:#B3C4D9;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="209.1553" x="974.9966" y="1165.27">Today there is one inbound port</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.5596" x="974.9966" y="1180.4028">(WatchlistUseCase, command side)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="149.9189" x="974.9966" y="1195.5356">and one outbound port</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="146.8086" x="974.9966" y="1210.6685">(WatchlistPort, CRUD).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="245.1084" x="974.9966" y="1225.8013">A read-side port (WatchlistQueryPort)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="231.7148" x="974.9966" y="1240.9341">exists for the sentinel's projections.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="230.6357" x="974.9966" y="1256.0669">If a query API is added later we can</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="169.5459" x="974.9966" y="1271.1997">split the inbound port into</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="191.8262" x="974.9966" y="1286.3325">WatchlistCommandUseCase /</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="209.0093" x="974.9966" y="1301.4653">WatchlistQueryUseCase without</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="221.2856" x="974.9966" y="1316.5981">touching the controller's contract.</text><?plantuml-src ZLPjRzis4FwkNt78WCq6_99q1R86Gp7NyO1qIUF6plPXsGTQFCkCPL8bARj6KM0_OhzmlsHtb2p9ZhtDG12Gl3iUdtlkENdbKuJVX8yNgNBUGHyUHfCf3Crg9RI4l__y2qPQThtfqZ-OuASSTOnHv9PAPyAA5RY5a6QZT09paJfidCn4l4oioRKScjHO-ERdy6jOxE8Dh3MRqkXY_XeltnmnkbLp-jFupbY9zfJrM5YlOfK9xV-_uM6YU8aulsmOVp1-_zxPz_5h-URGuZ3EV3x_0I-YICIUbcS5jAb2xPzqQsoS9v09yZYtQViCX8Cu74PPdHkSLTLvGEU7HdjhqXJja_vTMhLcu8KKcKVxHn72s_H4W4U7G-6GxXPPbgfOU6KqPCPwKBf887SOayc901EqQnLpW4r5cVQJLgiinHKbxg2y8iHow_X4d35TUImBa_iY3LxTvmT0lCz45M5GFBa40VK-1i-PYAJmOaQf09pTRISVRyE1d4LHWJ5qtmQeu0h6zrIMliXKltvL_ukIN_k2SFRkINy1ocA9jWD-OT4jJ2h7be20hrnQjHOU2zn3n3hoIcHmFRtd7MbMGcduzPx2jQPbj3kZSTkEAhSIVV8KKWxuyX6LUzjIilCoWtQaYNDWLR8WvEP50W3N-wG0cwT8soqdLiWG-0N2JvDuWP8EP6L6kPrVjg_8aWtYYcOWCKCj7L2Dw8JEbPunnKEDEa0vb4VW2dRqo8QPtW5NtcA1jSGZ2un8Ko3uqOQRg5cIHU7CwN78NaJNSLYiiTsnCje1H5WHkrxWrElrshKNyu-joBZa4paaw2iIlTlUICAs7UsEoPAeGrPpfMLrobjSmHaTJ4Qte-4KwAA8rjtAWVIhvKhJlVlkCwQtI7-iRdrRNrSzuvZLBlV2eg9cR_VardyoWW40613YIg-5LTn5L99uwI2bfg7TijmYIImcZ5chv6agjcW37NAjM7_HEGvvvD8E6GNCiUiynqXoOOcmwED6BLzMmearLi-j1UL8DTYoHQHHVhjVZSVnzM0w8WMz-J0PFKptIsAMHyf1co_HfyqYlRqMp3EI4EgGAiT8uXwtAZBM3V-lFXMB3rIYAV2PqGv9CdfpQrPDK0eVTYhawmfUdP_3_IzF-fXxyzgW2mKpp9fwaTUT8940a-rgXTGvi55-0LA9X6VP-IKNlWlNzHecLI-t3iPEcvzo9-mIQJvGaJIcvHI05cFTfTaIU5pBGntwujKLr3FjUEp3-GNqEnNv0RDKa30VYDXiIn9aQ9Fqx40VMmAcc6B8PcP8qGGCRsy2gKkFXbe-cnaPQEeSpnvXSh6kjOF2iJs7ZXT29-Y2LZebYsmM-5aaPDxjqbBGn2saU4CznC974Rc_-5aEljrbvveTL9UmfF2kYbCZnPQZMUImD5JsH9hL_n333g5JVE9nWktmMXayQGQVS1q7mHy-F5wt6Ue1M1Io6nuOfdTj-J57ksLp3eoV