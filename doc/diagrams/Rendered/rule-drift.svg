5" style="stroke:#000000;stroke-width:1;" width="121.6909" x="106.15" y="314.4094"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="101.6909" x="116.15" y="327.6198">checks: isSettled()</text></g><g class="entity" data-qualified-name="Sprint 12. Reservation Feature.GMN13" data-source-line="20" id="ent0014"><path d="M873.47,506.4094 L873.47,554.8234 L1070.5398,554.8234 L1070.5398,516.4094 L1060.5398,506.4094 L873.47,506.4094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1060.5398,506.4094 L1060.5398,516.4094 L1070.5398,516.4094 L1060.5398,506.4094" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="52.2285" x="879.47" y="521.6198">Added by</text><text fill="#000000" font-family="Verdana" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="75.5229" x="935.1951" y="521.6198">Developer B</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="22.6982" x="1014.2146" y="521.6198">who</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="157.0293" x="879.47" y="534.4245">copied the settlement check</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="176.0698" x="879.47" y="547.2292">but missed the reservation flag.</text></g><!--entity s12_check--><g class="entity" data-qualified-name="Sprint 12. Reservation Feature.s12_svc.s12_check" data-source-line="14" id="ent0010"><rect fill="#FFFFFF" height="18.8047" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="219.3105" x="374.34" y="521.2194"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="199.3105" x="384.34" y="534.4298">checks: isSettled() &amp;&amp; !isReserved()</text></g><!--entity s12_lot_body--><g class="entity" data-qualified-name="Sprint 12. Reservation Feature.s12_lot.s12_lot_body" data-source-line="17" id="ent0012"><rect fill="#FFCDD2" height="18.8047" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="101.5547" x="701.22" y="521.2194"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="81.5547" x="711.22" y="534.4298">isSettled(asOf)</text></g><g class="entity" data-qualified-name="Sprint 14. New Endpoints.GMN23" data-source-line="37" id="ent0024"><path d="M943.28,129.7994 L943.28,178.2134 L1156.7102,178.2134 L1156.7102,139.7994 L1146.7102,129.7994 L943.28,129.7994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1146.7102,129.7994 L1146.7102,139.7994 L1156.7102,139.7994 L1146.7102,129.7994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="75.2114" x="949.28" y="145.0098">Developer C</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="48.3882" x="1027.988" y="145.0098">assumes</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="192.4302" x="949.28" y="157.8145">domain methods are authoritative.</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="142.3018" x="949.28" y="170.6192">They are not &#8212; they drift.</text></g><!--entity s14_delegate--><g class="entity" data-qualified-name="Sprint 14. New Endpoints.s14_query.s14_delegate" data-source-line="28" id="ent0018"><rect fill="#FFFFFF" height="18.8047" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="240.6606" x="631.67" y="144.6094"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="220.6606" x="641.67" y="157.8198">delegates to holding.getEligibleShares()</text></g><!--entity s14_sum--><g class="entity" data-qualified-name="Sprint 14. New Endpoints.s14_holding.s14_sum" data-source-line="31" id="ent0020"><rect fill="#FFFFFF" height="18.8047" rx="2.5" ry="2.5" style="stroke:#000000;stroke-width:1;" width="168.9941" x="667.5" y="314.4094"/><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="148.9941" x="677.5" y="327.6198">&#931; lot.availableShares(asOf)</text></g><g class="entity" data-qualified-name="GMN28" data-source-line="47" id="ent0029"><path d="M1188.77,293.1994 L1188.77,354.4181 L1539.2383,354.4181 L1539.2383,303.1994 L1529.2383,293.1994 L1188.77,293.1994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><path d="M1529.2383,293.1994 L1529.2383,303.1994 L1539.2383,303.1994 L1529.2383,293.1994" fill="#FFFFFF" style="stroke:#000000;stroke-width:1;"/><text fill="#000000" font-family="Verdana" font-size="11" font-weight="bold" lengthAdjust="spacing" textLength="104.543" x="1194.77" y="308.4098">Timeline of drift:</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="278.4644" x="1194.77" y="321.2145">Sprint 10: One copy of the rule &#8594; no inconsistency</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="329.4683" x="1194.77" y="334.0192">Sprint 12: Two copies (service + domain) &#8594; drift introduced</text><text fill="#000000" font-family="Verdana" font-size="11" lengthAdjust="spacing" textLength="320.5522" x="1194.77" y="346.8239">Sprint 14: New code trusts domain &#8594; drift surfaces as bug</text></g><!--link s10_check to GMN5--><g class="link" data-entity-1="ent0004" data-entity-2="ent0006" data-link-type="association" data-source-line="9" id="lnk7"><path d="M169.93,313.9494 C179.34,284.4394 211.26,199.6694 264.5,211.9094 C323.71,225.5294 376.98,277.8994 401.98,305.9094" fill="none" id="s10_check-GMN5" style="stroke:#000000;stroke-width:1;stroke-dasharray:7,7;"/></g><!--link s12_lot to GMN13--><g class="link" data-entity-1="ent0011" data-entity-2="ent0014" data-link-type="association"