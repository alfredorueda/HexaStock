# Disable MongoDB auto-configuration when the jpa profile is active.
# Mirrors the symmetric exclusions in application-mongodb.properties so that
# under the "jpa" profile no MongoClient / MongoTemplate / Mongo repositories
# are bootstrapped, eliminating the harmless but noisy "Connection refused"
# logs from the MongoDB driver's ServerMonitor thread (default localhost:27017).
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,\
  org.springframework.boot.autoconfigure.mongo.MongoReactiveAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoReactiveDataAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.mongo.MongoReactiveRepositoriesAutoConfiguration
